appId: com.vanhbaka.aiws
productName: AI Workspace
directories:
  output: dist-gui
  buildResources: build

# Do NOT rebuild native modules — @lydell/node-pty ships N-API prebuilds; this machine has no MSVC.
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

asar: true
# Unpack the WHOLE @lydell tree on every platform: the native .node binaries (and, on Windows,
# conpty.dll / OpenConsole.exe / the conout worker) resolve by relative path, so they must live on
# the real filesystem next to the package, not inside the asar.
asarUnpack:
  - "**/node_modules/@lydell/node-pty/**"
  - "**/node_modules/@lydell/node-pty-*/**"

# App source: the built out/ + package.json. Production node_modules are added automatically by
# electron-builder; the negations trim node-pty debug symbols (~10 MB) and sourcemaps.
files:
  - "out/**"
  - "package.json"
  - "!node_modules/@lydell/**/*.pdb"
  - "!node_modules/@lydell/**/*.map"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: AI Workspace

portable:
  artifactName: aiws-${version}-portable.exe

mac:
  target:
    - target: dmg
      arch: [arm64] # Apple Silicon. Intel needs a native x64 runner; add later if requested.
  category: public.app-category.developer-tools
  artifactName: aiws-${version}-mac-arm64.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  artifactName: aiws-${version}-linux-x64.${ext}
# Not code signed. Windows shows SmartScreen; macOS Gatekeeper blocks on first open (right click,
# then Open); Linux runs as is. Signing needs paid Apple / Windows certificates, add later.
